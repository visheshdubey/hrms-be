services:
  redis:
    image: redis:7-alpine
    container_name: hrms-be-redis-prod
    restart: always
    networks:
      - ats_network

  hrms-be-prod:
    image: hrms-be:prod
    container_name: hrms-be-prod
    build:
      context: ../
      dockerfile: Dockerfile
    ports:
      - "3202:3000"
    env_file:
      - ./volume/env/.env
    volumes:
      - ./volume/env/.env:/app/.env
    environment:
      REDIS_URL: redis://hrms-be-redis-prod:6379
      ENABLE_QUEUE_WORKER: "true"
    depends_on:
      - redis
    restart: always
    networks:
      - shared_network
      - ats_network

networks:
  shared_network:
    external: true
  ats_network:
    external: true
    name: ats-backend-live_ats-network
