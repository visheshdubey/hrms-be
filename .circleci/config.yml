version: 2.1

executors:
    deploy-executor:
        docker:
            - image: cimg/base:stable

commands:
    install-rsync:
        description: "Install rsync if not already installed"
        steps:
            - run:
                  name: Install rsync
                  command: |
                      if ! command -v rsync &> /dev/null; then
                        sudo apt-get update
                        sudo apt-get install -y rsync
                      fi

    clean-disk-space:
        description: "Free disk space on remote server"
        steps:
            - run:
                  name: Clean remote disk
                  command: |
                      ssh -o StrictHostKeyChecking=no root@147.93.18.45 "docker image prune -af || true; docker container prune -f || true; journalctl --vacuum-time=1d || true"

    create-remote-dir:
        description: "Create remote directory on server"
        parameters:
            environment:
                type: string
        steps:
            - run:
                  name: Create remote directory
                  command: |
                      ssh -o StrictHostKeyChecking=no root@147.93.18.45 "mkdir -p /home/source/<< parameters.environment >>/${CIRCLE_PROJECT_REPONAME}/"

    upload-code:
        description: "Upload code to server using rsync"
        parameters:
            environment:
                type: string
        steps:
            - run:
                  name: Install rsync on remote server
                  command: |
                      ssh -o StrictHostKeyChecking=no root@147.93.18.45 "if ! command -v rsync &> /dev/null; then apt-get update && apt-get install -y rsync; fi"
            - run:
                  name: Upload code to server
                  command: |
                      rsync -avz -e "ssh -o StrictHostKeyChecking=no" \
                        --exclude='.git' \
                        --exclude='node_modules' \
                        --exclude='dist' \
                        --exclude='.venv' \
                        --exclude='__pycache__' \
                        --exclude='sqlite.db' \
                        --exclude='data/sqlite.db' \
                        ./ root@147.93.18.45:/home/source/<< parameters.environment >>/${CIRCLE_PROJECT_REPONAME}/

    build-docker:
        description: "Build Docker image on VPS"
        parameters:
            environment:
                type: string
        steps:
            - run:
                  name: Build Docker image
                  command: |
                      printf -v circle_project_reponame %q "${CIRCLE_PROJECT_REPONAME}"
                      ssh -o StrictHostKeyChecking=no root@147.93.18.45 "bash -s $circle_project_reponame" \<< 'EOF'
                        circle_project_reponame_var=$1
                        cd /home/source/<< parameters.environment >>/$circle_project_reponame_var/
                        docker build -t $circle_project_reponame_var:<< parameters.environment >> -f Dockerfile .
                      EOF

    setup-environment:
        description: "Setup environment variables on VPS"
        parameters:
            environment:
                type: string
        steps:
            - run:
                  name: Setup ENV
                  command: |
                      printf -v circle_project_reponame %q "${CIRCLE_PROJECT_REPONAME}"
                      ssh -o StrictHostKeyChecking=no root@147.93.18.45 "bash -s $circle_project_reponame" \<< 'EOF'
                        circle_project_reponame_var=$1
                        mkdir -p /home/source/<< parameters.environment >>/$circle_project_reponame_var/docker/volume/env/
                        if [ -f /home/env/<< parameters.environment >>/$circle_project_reponame_var/<< parameters.environment >>.env ]; then
                          cp /home/env/<< parameters.environment >>/$circle_project_reponame_var/<< parameters.environment >>.env /home/source/<< parameters.environment >>/$circle_project_reponame_var/docker/volume/env/.env
                        else
                          touch /home/source/<< parameters.environment >>/$circle_project_reponame_var/docker/volume/env/.env
                        fi
                      EOF

    deploy-docker:
        description: "Deploy Docker container"
        parameters:
            environment:
                type: string
        steps:
            - run:
                  name: Deploy Docker container
                  command: |
                      printf -v circle_project_reponame %q "${CIRCLE_PROJECT_REPONAME}"
                      ssh -o StrictHostKeyChecking=no root@147.93.18.45 "bash -s $circle_project_reponame" \<< 'EOF'
                        set -e
                        circle_project_reponame_var=$1
                        compose_project="${circle_project_reponame_var}-<< parameters.environment >>"
                        compose_file="./docker/docker-compose.<< parameters.environment >>.yml"
                        container_name="${circle_project_reponame_var}-<< parameters.environment >>"

                        cd /home/source/<< parameters.environment >>/$circle_project_reponame_var/

                        docker compose -p "$compose_project" -f "$compose_file" down --remove-orphans || true
                        docker stop "$container_name" 2>/dev/null || true
                        docker rm -f "$container_name" 2>/dev/null || true

                        # Free redis names from current + legacy compose naming.
                        # Default project name becomes e.g. hrms-be-prod-redis-1 and can race on recreate.
                        for redis_name in \
                          hrms-be-redis-prod \
                          "${compose_project}-redis-1" \
                          hrms-be-prod-redis-1 \
                          "${circle_project_reponame_var}-redis-<< parameters.environment >>"
                        do
                          docker rm -f "$redis_name" 2>/dev/null || true
                        done
                        docker ps -aq --filter "name=${compose_project}-redis" | xargs -r docker rm -f 2>/dev/null || true

                        # Wait for Docker to release names before recreate
                        sleep 3
                        docker rm -f "$container_name" hrms-be-redis-prod "${compose_project}-redis-1" hrms-be-prod-redis-1 2>/dev/null || true

                        docker compose -p "$compose_project" -f "$compose_file" up -d --build --force-recreate --remove-orphans

                        # Wait until API root responds (schema/boot can lag behind "Up").
                        echo "Waiting for API on :3202..."
                        ready=0
                        for attempt in $(seq 1 45); do
                          body="$(curl -fsS -m 5 "http://127.0.0.1:3202/" 2>/dev/null || true)"
                          if echo "$body" | grep -q 'APTO Hono API'; then
                            echo "OK: API ready on attempt ${attempt}"
                            ready=1
                            break
                          fi
                          echo "API not ready yet (attempt ${attempt}/45)..."
                          sleep 2
                        done
                        if [ "$ready" -ne 1 ]; then
                          echo "ERROR: API failed to become ready on :3202"
                          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' || true
                          docker logs --tail 120 "$container_name" 2>/dev/null || true
                          exit 1
                        fi
                      EOF

    update-nginx:
        description: "Update host Nginx site config"
        parameters:
            environment:
                type: string
        steps:
            - run:
                  name: Update Nginx site config
                  command: |
                      printf -v circle_project_reponame %q "${CIRCLE_PROJECT_REPONAME}"
                      printf -v app_domain %q "hrms-be.devcognito.tech"
                      ssh -o StrictHostKeyChecking=no root@147.93.18.45 "bash -s $circle_project_reponame $app_domain" \<< 'EOF'
                        set -euo pipefail
                        circle_project_reponame_var=$1
                        domain=$2
                        cd /home/source/<< parameters.environment >>/$circle_project_reponame_var/
                        # Strip Windows CRLF if present (breaks bash on Linux)
                        sed -i 's/\r$//' deploy/nginx/apply-site.sh
                        chmod +x deploy/nginx/apply-site.sh
                        ./deploy/nginx/apply-site.sh "${circle_project_reponame_var}" "${domain}" 3202

                        # Re-check with retries (port can flap briefly after nginx reload).
                        body=""
                        for attempt in $(seq 1 20); do
                          body="$(curl -fsS -m 10 "http://127.0.0.1:3202/" 2>/dev/null || true)"
                          if echo "${body}" | grep -q 'APTO Hono API'; then
                            break
                          fi
                          echo "Post-nginx API check retry ${attempt}/20..."
                          sleep 2
                        done
                        echo "upstream body: ${body:0:200}"
                        if echo "${body}" | grep -qiE '<html|hrms-ui|<!doctype'; then
                          echo "ERROR: API upstream serving frontend HTML"
                          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' || true
                          exit 1
                        fi
                        if ! echo "${body}" | grep -q 'APTO Hono API'; then
                          echo "ERROR: API upstream missing ok payload"
                          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' || true
                          docker logs --tail 120 hrms-be-prod 2>/dev/null || true
                          exit 1
                        fi
                        pub="$(curl -fsSk -m 15 "https://${domain}/" || true)"
                        echo "public body: ${pub:0:200}"
                        if echo "${pub}" | grep -qiE '<html|hrms-ui|<!doctype'; then
                          echo "ERROR: public ${domain} serving frontend HTML"
                          exit 1
                        fi
                        echo "OK: nginx + API checks passed"
                      EOF

jobs:
    checkout-code:
        executor: deploy-executor
        steps:
            - checkout

    upload-to-prod:
        executor: deploy-executor
        steps:
            - checkout
            - add_ssh_keys
            - clean-disk-space
            - install-rsync
            - create-remote-dir:
                  environment: prod
            - upload-code:
                  environment: prod

    build-prod:
        executor: deploy-executor
        steps:
            - checkout
            - add_ssh_keys
            - build-docker:
                  environment: prod

    setup-environment-prod:
        executor: deploy-executor
        steps:
            - checkout
            - add_ssh_keys
            - setup-environment:
                  environment: prod

    deploy-prod:
        executor: deploy-executor
        steps:
            - checkout
            - add_ssh_keys
            - deploy-docker:
                  environment: prod

    update-nginx-prod:
        executor: deploy-executor
        steps:
            - checkout
            - add_ssh_keys
            - update-nginx:
                  environment: prod

workflows:
    deploy-to-prod:
        jobs:
            - checkout-code:
                  filters:
                      branches:
                          only:
                              - main
                              - candidates-stable
            - upload-to-prod:
                  requires:
                      - checkout-code
                  filters:
                      branches:
                          only:
                              - main
                              - candidates-stable
            - build-prod:
                  requires:
                      - upload-to-prod
                  filters:
                      branches:
                          only:
                              - main
                              - candidates-stable
            - setup-environment-prod:
                  requires:
                      - build-prod
                  filters:
                      branches:
                          only:
                              - main
                              - candidates-stable
            - deploy-prod:
                  requires:
                      - setup-environment-prod
                  filters:
                      branches:
                          only:
                              - main
                              - candidates-stable
            - update-nginx-prod:
                  requires:
                      - deploy-prod
                  filters:
                      branches:
                          only:
                              - main
                              - candidates-stable
